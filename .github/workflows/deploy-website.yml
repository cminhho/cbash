name: Deploy website to GitHub Pages

# Builds the Astro site in website/ and publishes the built output to the
# gh-pages branch, which GitHub Pages serves at https://cminhho.github.io/cbash/.
# (Replaces the manual tools/deploy-gh-pages.sh, which pushed raw source.)

on:
  push:
    branches: [master, main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: write # required to push to the gh-pages branch

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install & build
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          publish_branch: gh-pages
          force_orphan: true # keep gh-pages a single clean commit (no history bloat)
